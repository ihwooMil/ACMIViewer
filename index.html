<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACMI Tacview 3D Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'Consolas', 'Monaco', monospace; overflow: hidden; }
#canvas-container { width: 100vw; height: 100vh; position: relative; }
canvas { display: block; }

#drop-zone {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10,10,15,0.95); transition: opacity 0.3s;
}
#drop-zone.hidden { opacity: 0; pointer-events: none; }
#drop-zone .icon { font-size: 64px; margin-bottom: 20px; opacity: 0.7; }
#drop-zone h2 { font-size: 24px; font-weight: 300; color: #4af; margin-bottom: 8px; }
#drop-zone p { font-size: 14px; color: #888; }
#drop-zone.drag-over { background: rgba(20,40,80,0.95); }
#drop-zone .browse-btn {
  margin-top: 16px; padding: 8px 24px;
  background: rgba(68,170,255,0.2); border: 1px solid #4af; color: #4af;
  border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 14px;
}
#drop-zone .browse-btn:hover { background: rgba(68,170,255,0.3); }
#file-input { display: none; }

.hud { position: fixed; z-index: 10; pointer-events: auto; }

#info-panel {
  top: 12px; left: 12px;
  background: rgba(0,0,0,0.75); border: 1px solid #333; border-radius: 6px;
  padding: 10px 14px; min-width: 220px;
}
#info-panel .title { color: #4af; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
#info-panel .info-row { font-size: 12px; color: #aaa; margin: 2px 0; }
#info-panel .info-row span { color: #ddd; }

#object-panel {
  top: 12px; right: 12px;
  background: rgba(0,0,0,0.75); border: 1px solid #333; border-radius: 6px;
  padding: 10px 14px; min-width: 200px; max-height: 50vh; overflow-y: auto;
}
#object-panel .section-title { color: #4af; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.obj-entry {
  font-size: 12px; padding: 3px 6px; margin: 2px 0; border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.obj-entry:hover { background: rgba(255,255,255,0.1); }
.obj-entry.tracking { background: rgba(68,170,255,0.2); border: 1px solid #4af; }
.obj-entry .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.obj-entry.destroyed { opacity: 0.4; text-decoration: line-through; }

#timeline-bar {
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85); border-top: 1px solid #333;
  padding: 8px 16px 12px;
}
#timeline-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
#timeline-controls button {
  background: rgba(255,255,255,0.1); border: 1px solid #555; color: #ddd;
  padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px;
}
#timeline-controls button:hover { background: rgba(255,255,255,0.2); }
#time-display { font-size: 14px; color: #4af; min-width: 80px; text-align: center; font-variant-numeric: tabular-nums; }
#speed-display { font-size: 12px; color: #888; min-width: 40px; text-align: center; }

#timeline-slider {
  width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
  background: #222; border-radius: 3px; outline: none; cursor: pointer;
}
#timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #4af; border-radius: 50%; cursor: grab; }
#timeline-slider::-moz-range-thumb { width: 14px; height: 14px; background: #4af; border-radius: 50%; cursor: grab; border: none; }

#event-log { position: fixed; bottom: 60px; right: 16px; z-index: 10; max-width: 500px; pointer-events: none; text-align: right; }
.event-msg {
  font-size: 13px; padding: 4px 10px; margin: 3px 0; border-radius: 4px;
  background: rgba(0,0,0,0.7); border-left: 3px solid #4af;
  animation: fadeInUp 0.3s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
  white-space: nowrap;
}
.event-msg.red-event { border-left-color: #f44; }
.event-msg.blue-event { border-left-color: #4af; }
.event-msg.hit-event { border-left-color: #ff0; color: #ff0; font-weight: bold; }
.event-msg.destroyed-event { border-left-color: #f44; color: #f44; }
.event-msg.takeoff-event { border-left-color: #4f4; color: #4f4; }
.event-msg.landed-event { border-left-color: #48f; color: #48f; }
.event-msg.bookmark-event { border-left-color: #ff4; color: #ff4; }
.event-msg.timeout-event { border-left-color: #f80; color: #f80; }

#detail-panel {
  bottom: 80px; left: 12px;
  background: rgba(0,0,0,0.8); border: 1px solid #333; border-radius: 6px;
  padding: 10px 14px; min-width: 260px; max-width: 320px; max-height: 45vh;
  overflow-y: auto; font-size: 12px;
}
#detail-panel .section-title { color: #4af; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
#detail-panel .detail-section-header { color: #6af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin: 6px 0 3px; border-bottom: 1px solid #333; padding-bottom: 2px; }
#detail-panel .detail-row { color: #aaa; margin: 1px 0; display: flex; justify-content: space-between; gap: 12px; }
#detail-panel .detail-row .detail-key { color: #888; white-space: nowrap; }
#detail-panel .detail-row .detail-val { color: #ddd; text-align: right; overflow: hidden; text-overflow: ellipsis; }

.obj-entry .obj-extra { font-size: 10px; color: #888; margin-left: auto; }
.obj-entry .obj-callsign { color: #8af; font-size: 11px; }
.obj-type-header { color: #6af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 3px; padding-bottom: 2px; border-bottom: 1px solid #222; }

@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

#camera-mode {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
  background: rgba(0,0,0,0.75); border: 1px solid #333; border-radius: 4px;
  padding: 4px 12px; font-size: 12px; color: #888;
}
#camera-mode span { color: #4af; }

.label-3d {
  position: absolute; pointer-events: none; font-size: 11px; white-space: nowrap;
  text-shadow: 0 0 4px #000, 0 0 8px #000;
  padding: 1px 4px; will-change: transform;
  transform: translate(-50%, -100%);
}

#viz-panel {
  top: 170px; left: 12px;
  background: rgba(0,0,0,0.75); border: 1px solid #333; border-radius: 6px;
  padding: 10px 14px; min-width: 140px;
}
#viz-panel .section-title { color: #4af; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
#viz-panel label { display: block; font-size: 12px; color: #ccc; cursor: pointer; margin: 4px 0; }
#viz-panel label:hover { color: #fff; }
#viz-panel input[type="checkbox"] { margin-right: 6px; vertical-align: middle; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
</style>
</head>
<body>

<div id="drop-zone">
  <div class="icon">&#9992;</div>
  <h2>ACMI Tacview 3D Viewer</h2>
  <p>Drag &amp; drop an ACMI file here to begin</p>
  <button class="browse-btn" onclick="document.getElementById('file-input').click()">Browse Files</button>
  <input type="file" id="file-input" accept=".acmi,.txt">
</div>

<div id="canvas-container"></div>

<div id="camera-mode" class="hud" style="display:none;">
  Camera: <span id="camera-mode-text">Free</span>
  <small style="color:#666">&nbsp;[ESC] free &bull; dblclick to track</small>
</div>

<div id="info-panel" class="hud" style="display:none;">
  <div class="title" id="scenario-title">-</div>
  <div class="info-row">Time: <span id="info-time">0.0s</span></div>
  <div class="info-row">Objects: <span id="info-objects">0</span></div>
  <div class="info-row">Duration: <span id="info-duration">0.0s</span></div>
  <div id="info-extra"></div>
</div>

<div id="object-panel" class="hud" style="display:none;">
  <div class="section-title">Objects</div>
  <div id="object-list"></div>
</div>

<div id="detail-panel" class="hud" style="display:none;">
  <div class="section-title">Detail <span id="detail-name"></span></div>
  <div id="detail-content"></div>
</div>

<div id="event-log"></div>

<div id="viz-panel" class="hud" style="display:none;">
  <div class="section-title">Overlays</div>
  <label><input type="checkbox" id="viz-lar" checked> LAR Cones</label>
  <label><input type="checkbox" id="viz-nez" checked> NEZ Cones</label>
  <label><input type="checkbox" id="viz-radar"> Radar Cone</label>
  <label><input type="checkbox" id="viz-wez"> WEZ Range</label>

</div>

<div id="timeline-bar" class="hud" style="display:none;">
  <div id="timeline-controls">
    <button id="btn-play" title="Space">&#9654; Play</button>
    <button id="btn-slower" title="-">&#9664;</button>
    <span id="speed-display">1x</span>
    <button id="btn-faster" title="+">&#9654;</button>
    <span id="time-display">00:00.0</span>
    <span style="flex:1"></span>
    <button id="btn-reset" title="R">&#8634; Reset</button>
  </div>
  <input type="range" id="timeline-slider" min="0" max="1000" value="0" step="1">
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════
// ACMI 2.2 Property Sets
// ═══════════════════════════════════════════
const STATIC_TEXT_PROPS = new Set([
  'Name','Type','AdditionalType','Parent','Next','ShortName','LongName','FullName',
  'CallSign','Registration','Squawk','ICAO24','Pilot','Group','Country','Coalition',
  'Color','Shape','Debug','FocusedTarget',
  'LockedTarget','LockedTarget2','LockedTarget3','LockedTarget4',
  'LockedTarget5','LockedTarget6','LockedTarget7','LockedTarget8','LockedTarget9'
]);

const DYNAMIC_NUM_PROPS = new Set([
  'Importance','Slot','Disabled','Visible','Health',
  'Length','Width','Height','Radius',
  'IAS','CAS','TAS','Mach','AltimeterSetting','OnGround','AOA','AOS','AGL','HDG','HDM',
  'Throttle','Throttle2','EngineRPM','EngineRPM2',
  'Afterburner','AirBrakes','Flaps','LandingGear','LandingGearHandle',
  'Tailhook','Parachute','DragChute',
  'FuelWeight','FuelWeight2','FuelWeight3','FuelWeight4','FuelWeight5',
  'FuelWeight6','FuelWeight7','FuelWeight8','FuelWeight9',
  'FuelVolume','FuelVolume2','FuelVolume3','FuelVolume4','FuelVolume5',
  'FuelVolume6','FuelVolume7','FuelVolume8','FuelVolume9',
  'FuelFlowWeight','FuelFlowWeight2','FuelFlowWeight3','FuelFlowWeight4',
  'FuelFlowWeight5','FuelFlowWeight6','FuelFlowWeight7','FuelFlowWeight8',
  'FuelFlowVolume','FuelFlowVolume2','FuelFlowVolume3','FuelFlowVolume4',
  'FuelFlowVolume5','FuelFlowVolume6','FuelFlowVolume7','FuelFlowVolume8',
  'RadarMode','RadarAzimuth','RadarElevation','RadarRoll','RadarRange',
  'RadarHorizontalBeamwidth','RadarVerticalBeamwidth',
  'RadarRangeGateAzimuth','RadarRangeGateElevation','RadarRangeGateRoll',
  'RadarRangeGateMin','RadarRangeGateMax',
  'RadarRangeGateHorizontalBeamwidth','RadarRangeGateVerticalBeamwidth',
  'LockedTargetMode','LockedTargetAzimuth','LockedTargetElevation','LockedTargetRange',
  'EngagementMode','EngagementMode2','EngagementRange','EngagementRange2',
  'VerticalEngagementRange','VerticalEngagementRange2',
  'RollControlInput','PitchControlInput','YawControlInput',
  'RollControlPosition','PitchControlPosition','YawControlPosition',
  'RollTrimTab','PitchTrimTab','YawTrimTab',
  'AileronLeft','AileronRight','Elevator','Rudder',
  'LocalizerLateralDeviation','GlideslopeVerticalDeviation',
  'LocalizerAngularDeviation','GlideslopeAngularDeviation',
  'PilotHeadRoll','PilotHeadPitch','PilotHeadYaw',
  'PilotEyeGazePitch','PilotEyeGazeYaw',
  'VerticalGForce','LongitudinalGForce','LateralGForce',
  'QNH','WindDirection','WindPitch','WindSpeed',
  'TriggerPressed','ENL','HeartRate','SpO2',
  'NR','NR2','RotorRPM','RotorRPM2'
]);

const DETAIL_CATEGORIES = [
  { name: 'Identity', keys: ['Name','CallSign','ShortName','LongName','FullName','Registration','Squawk','ICAO24','Type','AdditionalType','Country','Coalition','Group','Pilot'] },
  { name: 'Status', keys: ['Health','Disabled','Visible','Importance','OnGround'] },
  { name: 'Speed', keys: ['IAS','CAS','TAS','Mach'] },
  { name: 'Engine', keys: ['Throttle','Throttle2','EngineRPM','EngineRPM2','Afterburner','NR','NR2','RotorRPM','RotorRPM2'] },
  { name: 'Flight Controls', keys: ['AirBrakes','Flaps','LandingGear','LandingGearHandle','Tailhook','Parachute','DragChute'] },
  { name: 'Fuel', keys: ['FuelWeight','FuelWeight2','FuelWeight3','FuelWeight4','FuelWeight5','FuelWeight6','FuelWeight7','FuelWeight8','FuelWeight9','FuelVolume','FuelVolume2','FuelVolume3','FuelVolume4','FuelVolume5','FuelVolume6','FuelVolume7','FuelVolume8','FuelVolume9','FuelFlowWeight','FuelFlowWeight2','FuelFlowWeight3','FuelFlowWeight4','FuelFlowWeight5','FuelFlowWeight6','FuelFlowWeight7','FuelFlowWeight8','FuelFlowVolume','FuelFlowVolume2','FuelFlowVolume3','FuelFlowVolume4','FuelFlowVolume5','FuelFlowVolume6','FuelFlowVolume7','FuelFlowVolume8'] },
  { name: 'Radar', keys: ['RadarMode','RadarAzimuth','RadarElevation','RadarRoll','RadarRange','RadarHorizontalBeamwidth','RadarVerticalBeamwidth'] },
  { name: 'Targeting', keys: ['FocusedTarget','LockedTarget','LockedTarget2','LockedTarget3','LockedTargetMode','LockedTargetAzimuth','LockedTargetElevation','LockedTargetRange','EngagementMode','EngagementMode2','EngagementRange','EngagementRange2','VerticalEngagementRange','VerticalEngagementRange2'] },
  { name: 'Controls', keys: ['RollControlInput','PitchControlInput','YawControlInput','RollControlPosition','PitchControlPosition','YawControlPosition','RollTrimTab','PitchTrimTab','YawTrimTab','AileronLeft','AileronRight','Elevator','Rudder'] },
  { name: 'Navigation', keys: ['AGL','HDG','HDM','AOA','AOS','AltimeterSetting','LocalizerLateralDeviation','GlideslopeVerticalDeviation','LocalizerAngularDeviation','GlideslopeAngularDeviation'] },
  { name: 'G-Force', keys: ['VerticalGForce','LongitudinalGForce','LateralGForce'] },
  { name: 'Pilot', keys: ['PilotHeadRoll','PilotHeadPitch','PilotHeadYaw','PilotEyeGazePitch','PilotEyeGazeYaw'] },
  { name: 'Environment', keys: ['WindDirection','WindPitch','WindSpeed','QNH'] },
  { name: 'Other', keys: ['TriggerPressed','ENL','HeartRate','SpO2','Length','Width','Height','Radius','Slot'] },
];

// ═══════════════════════════════════════════
// ACMI Parser
// ═══════════════════════════════════════════
function parseACMI(text) {
  const lines = text.split('\n');
  const data = {
    refLat: 0, refLon: 0, refTime: '', title: '',
    dataSource: '', dataRecorder: '', recordingTime: '', author: '',
    category: '', briefing: '', debriefing: '', comments: '', mapId: '',
    frames: [], objectDefs: {}, maxTime: 0,
  };
  let currentFrame = null;

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li].trim();
    if (!line || line.charCodeAt(0) === 70 && line.startsWith('File')) continue; // FileType/FileVersion

    if (line.charCodeAt(0) === 35) { // '#'
      const t = parseFloat(line.substring(1));
      currentFrame = { time: t, updates: [], removals: [], events: [], labels: {} };
      data.frames.push(currentFrame);
      if (t > data.maxTime) data.maxTime = t;
      continue;
    }

    if (line.charCodeAt(0) === 48 && line.charCodeAt(1) === 44) { // '0,'
      const rest = line.substring(2);
      const eqi = rest.indexOf('=');
      if (eqi === -1) continue;
      const key = rest.substring(0, eqi);
      const val = rest.substring(eqi + 1);
      if (key === 'ReferenceLatitude') data.refLat = parseFloat(val);
      else if (key === 'ReferenceLongitude') data.refLon = parseFloat(val);
      else if (key === 'ReferenceTime') data.refTime = val;
      else if (key === 'Title') data.title = val;
      else if (key === 'DataSource') data.dataSource = val;
      else if (key === 'DataRecorder') data.dataRecorder = val;
      else if (key === 'RecordingTime') data.recordingTime = val;
      else if (key === 'Author') data.author = val;
      else if (key === 'Category') data.category = val;
      else if (key === 'Briefing') data.briefing = val;
      else if (key === 'Debriefing') data.debriefing = val;
      else if (key === 'Comments') data.comments = val;
      else if (key === 'MapId') data.mapId = val;
      else if (key === 'Event' && currentFrame) currentFrame.events.push(val);
      continue;
    }

    if (line.charCodeAt(0) === 45) { // '-'
      if (currentFrame) currentFrame.removals.push(line.substring(1));
      continue;
    }

    const ci = line.indexOf(',');
    if (ci === -1) continue;
    const id = line.substring(0, ci);
    const rest = line.substring(ci + 1);

    // Fast key=value split — handle T= specially (contains |)
    const update = { id };
    let updateHasData = false;
    let i = 0;
    while (i < rest.length) {
      const eqi = rest.indexOf('=', i);
      if (eqi === -1) break;
      const key = rest.substring(i, eqi);
      let end;
      if (key === 'T') {
        // T value ends at next comma followed by uppercase letter, or end of string
        end = eqi + 1;
        while (end < rest.length) {
          if (rest.charCodeAt(end) === 44) { // ','
            const next = rest.charCodeAt(end + 1);
            if (next >= 65 && next <= 90) break; // A-Z
          }
          end++;
        }
      } else {
        end = rest.indexOf(',', eqi + 1);
        if (end === -1) end = rest.length;
      }
      const val = rest.substring(eqi + 1, end);

      if (key === 'T') {
        const parts = val.split('|');
        const plen = parts.length;
        if (plen >= 3) {
          update.lon = +parts[0] || 0;
          update.lat = +parts[1] || 0;
          update.alt = +parts[2] || 0;
        }
        if (plen === 5) {
          // Native flat world: lon|lat|alt|U|V
          update.U = +parts[3] || 0;
          update.V = +parts[4] || 0;
        } else if (plen >= 6) {
          update.roll = +parts[3] || 0;
          update.pitch = +parts[4] || 0;
          update.yaw = +parts[5] || 0;
        }
        if (plen === 9) {
          // Full flat world: lon|lat|alt|roll|pitch|yaw|U|V|heading
          update.U = +parts[6] || 0;
          update.V = +parts[7] || 0;
          update.heading = +parts[8] || 0;
        }
        updateHasData = true;
      } else if (STATIC_TEXT_PROPS.has(key)) {
        (data.objectDefs[id] || (data.objectDefs[id] = {}))[key] = val;
      } else if (DYNAMIC_NUM_PROPS.has(key)) {
        update[key] = parseFloat(val);
        updateHasData = true;
      } else if (key === 'Label' && currentFrame) {
        currentFrame.labels[id] = val;
      }

      i = end + 1;
    }

    if (currentFrame && updateHasData) {
      currentFrame.updates.push(update);
    }
  }
  return data;
}

// ═══════════════════════════════════════════
// Geo → World (reusable vector to avoid alloc)
// ═══════════════════════════════════════════
const DEG_TO_M = 111320;
const _v3 = new THREE.Vector3();

function geoToWorld(out, lon, lat, alt, refLon, refLat) {
  out.x = (lon - refLon) * DEG_TO_M;
  out.y = alt;
  out.z = -(lat - refLat) * DEG_TO_M;
  return out;
}

// ═══════════════════════════════════════════
// Colors
// ═══════════════════════════════════════════
const COLOR_MAP = { Blue: 0x4488ff, Red: 0xff4444, Cyan: 0x00ccff, Orange: 0xff8800, Green: 0x44ff44, Yellow: 0xffff00, White: 0xffffff };
const CSS_COLOR  = { Blue: '#4488ff', Red: '#ff4444', Cyan: '#00ccff', Orange: '#ff8800', Green: '#44ff44', Yellow: '#ffff00', White: '#ffffff' };
function getColor(c) { return COLOR_MAP[c] || 0xcccccc; }
function getCSSColor(c) { return CSS_COLOR[c] || '#cccccc'; }

// ═══════════════════════════════════════════
// Aircraft mesh — single BufferGeometry, clear fighter shape
//
//   Top view (XZ plane, +Z = forward/nose):
//
//          nose
//           /\
//          /  \         ← fuselage top edges
//         / ·  \
//   ─────/      \─────  ← main delta wings (wide)
//   ────/   body  \────
//       \        /
//        \      /       ← rear fuselage narrows
//    ═════\    /═════   ← horizontal stabilizers
//          \  /
//           \/          ← tail nozzle
//           ||
//          ====         ← vertical tail fin (stands up in Y)
//
//   Side view (YZ plane):
//           ___________
//      fin |/          \  nose
//          |____________/
//
// ═══════════════════════════════════════════
function createAircraftGeo() {
  // All coords in local space. Forward = +Z, Up = +Y, Right = +X
  // We'll build triangles directly.
  const S = 100; // scale factor — 100 units ~ visible at typical zoom

  // Key points
  const nose   = [0,    0,    3.0*S];
  const wl     = [-2.5*S, 0, -0.2*S];  // wing tip left
  const wr     = [ 2.5*S, 0, -0.2*S];  // wing tip right
  const wlr    = [-1.8*S, 0, -1.0*S];  // wing trailing edge left
  const wrr    = [ 1.8*S, 0, -1.0*S];  // wing trailing edge right
  const bl     = [-0.35*S, 0, -0.5*S]; // body left
  const br     = [ 0.35*S, 0, -0.5*S]; // body right
  const tail   = [0,    0,   -2.5*S];  // tail point
  const tl     = [-1.2*S, 0, -2.0*S];  // h-stab tip left
  const tr     = [ 1.2*S, 0, -2.0*S];  // h-stab tip right
  const tlr    = [-0.6*S, 0, -2.4*S];  // h-stab trailing left
  const trr    = [ 0.6*S, 0, -2.4*S];  // h-stab trailing right

  // Body has slight height for 3D feel
  const bodyH = 0.25 * S;
  const noseUp  = [0, bodyH*0.6, 3.0*S];
  const topF    = [0, bodyH, 0.5*S];
  const topR    = [0, bodyH, -1.5*S];
  const botF    = [0, -bodyH*0.3, 0.5*S];

  // Vertical tail fin
  const finBase1 = [0, 0,      -1.5*S];
  const finBase2 = [0, 0,      -2.5*S];
  const finTop   = [0, 1.5*S,  -2.2*S];

  // Build triangles (both sides for visibility)
  const tris = [];
  function tri(a,b,c) { tris.push(...a,...b,...c); }
  function quad(a,b,c,d) { tri(a,b,c); tri(a,c,d); }

  // ── Delta wings (flat, both sides visible) ──
  // Left wing
  tri(nose, wl, wlr);
  tri(nose, wlr, bl);
  // Right wing
  tri(nose, wrr, wr);
  tri(nose, br, wrr);
  // Rear body
  quad(bl, wlr, tail, [0,0,-0.5*S]);
  quad(br, [0,0,-0.5*S], tail, wrr);
  // Horizontal stabilizers
  tri([0,0,-1.5*S], tl, tlr);
  tri([0,0,-1.5*S], trr, tr);

  // ── Fuselage top surface (gives 3D depth) ──
  tri(noseUp, [-0.3*S, bodyH*0.3, 1.0*S], [0.3*S, bodyH*0.3, 1.0*S]);
  quad([-0.3*S, bodyH*0.3, 1.0*S], topF, topR, [-0.3*S, bodyH*0.3, -1.0*S]);
  quad([0.3*S, bodyH*0.3, 1.0*S], [0.3*S, bodyH*0.3, -1.0*S], topR, topF);
  // Nose sides
  tri(nose, noseUp, [-0.3*S, bodyH*0.3, 1.0*S]);
  tri(nose, [0.3*S, bodyH*0.3, 1.0*S], noseUp);
  // Fuselage sides
  quad([-0.3*S, bodyH*0.3, 1.0*S], [-0.3*S, bodyH*0.3, -1.0*S], [-0.35*S, -bodyH*0.2, -1.0*S], [-0.35*S, -bodyH*0.2, 1.0*S]);
  quad([0.35*S, -bodyH*0.2, 1.0*S], [0.35*S, -bodyH*0.2, -1.0*S], [0.3*S, bodyH*0.3, -1.0*S], [0.3*S, bodyH*0.3, 1.0*S]);
  // Bottom
  tri(nose, [0.35*S, -bodyH*0.2, 1.0*S], [-0.35*S, -bodyH*0.2, 1.0*S]);

  // ── Vertical tail fin ──
  tri(finBase1, finTop, finBase2);
  tri(finBase2, finTop, finBase1); // back face

  const positions = new Float32Array(tris);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

// ═══════════════════════════════════════════
// Missile mesh — dart/arrow shape, single geo
// ═══════════════════════════════════════════
function createMissileGeo() {
  const S = 50;
  const tris = [];
  function tri(a,b,c) { tris.push(...a,...b,...c); }

  // Elongated body — 4-sided prism + nose cone + tail fins
  const r = 0.15 * S; // body radius
  const len = 3.0 * S;
  const noseLen = 0.8 * S;

  // 4 body vertices at front and back
  const bf = [ // body front (z = len/2 - noseLen)
    [ r,  0, len/2 - noseLen],
    [ 0,  r, len/2 - noseLen],
    [-r,  0, len/2 - noseLen],
    [ 0, -r, len/2 - noseLen],
  ];
  const bb = [ // body back (z = -len/2)
    [ r,  0, -len/2],
    [ 0,  r, -len/2],
    [-r,  0, -len/2],
    [ 0, -r, -len/2],
  ];
  const nose = [0, 0, len/2];

  // Nose cone
  for (let i = 0; i < 4; i++) {
    tri(nose, bf[i], bf[(i+1)%4]);
  }
  // Body sides
  for (let i = 0; i < 4; i++) {
    const j = (i+1)%4;
    tri(bf[i], bb[i], bb[j]);
    tri(bf[i], bb[j], bf[j]);
  }

  // Tail fins — 4 fins, cross pattern
  const finLen = 0.8 * S;
  const finW = 0.6 * S;
  const finZ1 = -len/2;
  const finZ2 = -len/2 + finLen;
  // +X fin
  tri([r, 0, finZ2], [r + finW, 0, finZ1], [r, 0, finZ1]);
  tri([r, 0, finZ1], [r + finW, 0, finZ1], [r, 0, finZ2]); // back face
  // -X fin
  tri([-r, 0, finZ2], [-r, 0, finZ1], [-r - finW, 0, finZ1]);
  tri([-r, 0, finZ2], [-r - finW, 0, finZ1], [-r, 0, finZ1]);
  // +Y fin
  tri([0, r, finZ2], [0, r + finW, finZ1], [0, r, finZ1]);
  tri([0, r, finZ1], [0, r + finW, finZ1], [0, r, finZ2]);
  // -Y fin
  tri([0, -r, finZ2], [0, -r, finZ1], [0, -r - finW, finZ1]);
  tri([0, -r, finZ2], [0, -r - finW, finZ1], [0, -r, finZ1]);

  const positions = new Float32Array(tris);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

// Pre-build shared geometries (huge perf win — no per-object geo creation)
const aircraftGeo = createAircraftGeo();
const missileGeo = createMissileGeo();

// ═══════════════════════════════════════════
// Radar / WEZ / Lock — shared geo & materials
// ═══════════════════════════════════════════
const DEG2RAD = Math.PI / 180;

function createUnitConeGeo(segments) {
  const tris = [];
  for (let i = 0; i < segments; i++) {
    const a1 = (i / segments) * Math.PI * 2;
    const a2 = ((i + 1) / segments) * Math.PI * 2;
    tris.push(
      0, 0, 0,
      Math.cos(a1), Math.sin(a1), 1,
      Math.cos(a2), Math.sin(a2), 1
    );
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(tris), 3));
  geo.computeVertexNormals();
  return geo;
}

const coneGeo = createUnitConeGeo(24);
const sphereGeo = new THREE.SphereGeometry(1, 16, 12);

// Circle parent mapping (circleId → parentAircraftId)
const circleParents = {};

const radarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.15, depthWrite: false, side: THREE.DoubleSide });
const wezMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.1, depthWrite: false, side: THREE.DoubleSide });
const lockMat = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });

const vizObjects = {};   // id → { radarCone, wezSphere, lockLine }
const vizEnabled = { lar: true, nez: true, radar: false, wez: false, lock: false };

const _vizQ1 = new THREE.Quaternion();
const _vizQ2 = new THREE.Quaternion();
const _vizEuler = new THREE.Euler();
const _vizDir = new THREE.Vector3();

// ═══════════════════════════════════════════
// Explosion (particle burst)
// ═══════════════════════════════════════════
function createExplosion(px, py, pz) {
  const N = 30;
  const pos = new Float32Array(N * 3);
  const vel = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    pos[i*3] = px; pos[i*3+1] = py; pos[i*3+2] = pz;
    vel[i*3]   = (Math.random()-0.5)*500;
    vel[i*3+1] = (Math.random()-0.5)*500;
    vel[i*3+2] = (Math.random()-0.5)*500;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xff8800, size: 100, transparent: true, opacity: 1, blending: THREE.AdditiveBlending, depthWrite: false });
  const pts = new THREE.Points(geo, mat);
  pts.userData = { vel, life: 1.0 };
  return pts;
}

// ═══════════════════════════════════════════

function initScene() {

// ═══════════════════════════════════════════
// Object creation (lazy, cached)
// ═══════════════════════════════════════════
function getOrCreate(id) {
  if (objects3D[id]) return objects3D[id];

  const def = acmiData.objectDefs[id] || {};
  const typeStr = def.Type || '';
  const isCircle = typeStr.includes('Circle');
  const isMissile = !isCircle && typeStr.includes('Missile');
  const colorHex = getColor(def.Color || 'White');

  let mesh;
  if (isCircle) {
    mesh = new THREE.Mesh(coneGeo, new THREE.MeshBasicMaterial({
      color: colorHex, transparent: true, opacity: 0.3,
      depthWrite: false, side: THREE.DoubleSide,
    }));
    mesh.renderOrder = 1;
  } else {
    const mat = new THREE.MeshPhongMaterial({
      color: colorHex,
      emissive: colorHex,
      emissiveIntensity: isMissile ? 0.5 : 0.25,
      flatShading: true,
      side: THREE.DoubleSide,
    });
    mesh = new THREE.Mesh(isMissile ? missileGeo : aircraftGeo, mat);
  }
  mesh.visible = false;
  scene.add(mesh);

  // Trail (skip for circles — no trail needed)
  let trail = null, trailGeo = null, trailBuf = null;
  if (!isCircle) {
    trailBuf = new Float32Array(TRAIL_MAX * 3);
    trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailBuf, 3));
    trailGeo.setDrawRange(0, 0);
    trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
      color: colorHex, transparent: true, opacity: isMissile ? 0.5 : 0.35,
    }));
    trail.frustumCulled = false;
    scene.add(trail);
  }

  // Label DOM (skip for circles)
  if (!isCircle) {
    const root = document.createElement('div');
    root.className = 'label-3d';
    root.style.color = getCSSColor(def.Color || 'White');
    root.style.display = 'none';
    const nameSpan = document.createElement('div');
    nameSpan.style.fontWeight = 'bold';
    nameSpan.textContent = def.Name || id;
    const infoSpan = document.createElement('div');
    infoSpan.style.fontSize = '10px';
    infoSpan.style.opacity = '0.8';
    const tacSpan = document.createElement('div');
    tacSpan.style.fontSize = '10px';
    tacSpan.style.color = '#ff0';
    root.append(nameSpan, infoSpan, tacSpan);
    document.getElementById('canvas-container').appendChild(root);
    labelEls[id] = { root, nameSpan, infoSpan, tacSpan };
  }

  const obj = { mesh, trail, trailGeo, trailBuf, trailCount: 0, alive: true, isMissile, isCircle };
  if (isCircle) {
    const name = (def.Name || '').toUpperCase();
    obj.coneHalfAngle = name.includes('AIM9') || name.includes('AIM-9') ? 30 * DEG2RAD : 45 * DEG2RAD;
    obj.coneType = name.includes('NEZ') ? 'nez' : 'lar';
  }
  objects3D[id] = obj;
  objectListDirty = true;
  return obj;
}

// ═══════════════════════════════════════════
// Per-object position timelines for smooth interpolation
// ═══════════════════════════════════════════
const objectTimelines = {};  // id → [{t, lon, lat, alt, roll, pitch, yaw}, ...]
const objectTlIdx = {};      // id → last binary-search index (cache for sequential playback)

function buildTimelines(data) {
  for (const id in objectTimelines) delete objectTimelines[id];
  for (const id in objectTlIdx) delete objectTlIdx[id];
  const lastRot = {};  // carry forward rotation if T= has only pos
  for (let fi = 0; fi < data.frames.length; fi++) {
    const frame = data.frames[fi];
    for (let ui = 0; ui < frame.updates.length; ui++) {
      const u = frame.updates[ui];
      if (u.lon === undefined) continue;
      let tl = objectTimelines[u.id];
      if (!tl) { tl = []; objectTimelines[u.id] = tl; }
      let rot = lastRot[u.id] || { roll:0, pitch:0, yaw:0 };
      if (u.yaw !== undefined) { rot = { roll:u.roll, pitch:u.pitch, yaw:u.yaw }; lastRot[u.id] = rot; }
      tl.push({ t: frame.time, lon:u.lon, lat:u.lat, alt:u.alt, roll:rot.roll, pitch:rot.pitch, yaw:rot.yaw });
    }
  }
}

// Binary search: find last index where tl[i].t <= time, with cached hint
function tlSearch(tl, time, hint) {
  const len = tl.length;
  if (len === 0) return -1;
  // Try the hint first (sequential playback optimization)
  if (hint >= 0 && hint < len - 1 && tl[hint].t <= time && tl[hint + 1].t > time) return hint;
  if (hint >= 0 && hint + 1 < len - 1 && tl[hint + 1].t <= time && tl[hint + 2].t > time) return hint + 1;
  if (time >= tl[len - 1].t) return len - 1;
  if (time < tl[0].t) return -1;
  let lo = 0, hi = len - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (tl[mid].t <= time) lo = mid; else hi = mid;
  }
  return lo;
}

// Shortest-path angle lerp (handles 359°→1° wrapping)
function lerpAngle(a, b, t) {
  let d = b - a;
  if (d > 180) d -= 360;
  else if (d < -180) d += 360;
  return a + d * t;
}

// Sample interpolated state from a timeline at given time
function sampleTimeline(tl, time, hint) {
  const idx = tlSearch(tl, time, hint);
  if (idx < 0) { const a = tl[0]; return { idx:0, lon:a.lon, lat:a.lat, alt:a.alt, yaw:a.yaw, pitch:a.pitch, roll:a.roll }; }
  if (idx >= tl.length - 1) { const a = tl[idx]; return { idx, lon:a.lon, lat:a.lat, alt:a.alt, yaw:a.yaw, pitch:a.pitch, roll:a.roll }; }
  const a = tl[idx], b = tl[idx + 1];
  const span = b.t - a.t;
  const t = span > 0 ? (time - a.t) / span : 0;
  return {
    idx,
    lon: a.lon + (b.lon - a.lon) * t,
    lat: a.lat + (b.lat - a.lat) * t,
    alt: a.alt + (b.alt - a.alt) * t,
    yaw: lerpAngle(a.yaw, b.yaw, t),
    pitch: a.pitch + (b.pitch - a.pitch) * t,
    roll: lerpAngle(a.roll, b.roll, t),
  };
}

// ═══════════════════════════════════════════
// Apply frames up to time (events, removals, labels, alive)
// ═══════════════════════════════════════════
function applyFramesUpTo(targetTime) {
  if (!acmiData) return;
  const frames = acmiData.frames;

  // Backward seek → full reset
  if (targetTime < currentTime) {
    for (const id in objects3D) {
      const o = objects3D[id];
      o.alive = true;
      o.mesh.visible = false;
      if (o.trail) { o.trail.visible = false; o.trailCount = 0; o.trailGeo.setDrawRange(0, 0); }
    }
    for (const id in objectStates) delete objectStates[id];
    for (const id in objectProps) delete objectProps[id];
    for (const id in objectTlIdx) objectTlIdx[id] = 0;
    for (const id in vizObjects) {
      const viz = vizObjects[id];
      if (viz.radarCone) viz.radarCone.visible = false;
      if (viz.wezSphere) viz.wezSphere.visible = false;
      if (viz.lockLine) viz.lockLine.visible = false;
    }
    lastFrameIdx = 0;
    objectListDirty = true;
  }

  const startIdx = lastFrameIdx;
  for (let fi = startIdx; fi < frames.length; fi++) {
    const frame = frames[fi];
    if (frame.time > targetTime) break;
    lastFrameIdx = fi;

    for (let ui = 0; ui < frame.updates.length; ui++) {
      const u = frame.updates[ui];
      let st = objectStates[u.id];
      if (!st) { st = { alive:true, label:'' }; objectStates[u.id] = st; }
      st.alive = true;
      // Merge dynamic properties (carry-forward: old values persist, new overwrite)
      for (const key in u) {
        if (key === 'id' || key === 'lon' || key === 'lat' || key === 'alt' ||
            key === 'roll' || key === 'pitch' || key === 'yaw' ||
            key === 'U' || key === 'V' || key === 'heading') continue;
        if (!objectProps[u.id]) objectProps[u.id] = {};
        objectProps[u.id][key] = u[key];
      }
    }

    for (let ri = 0; ri < frame.removals.length; ri++) {
      const rid = frame.removals[ri];
      const st = objectStates[rid];
      if (st && st.alive) {
        st.alive = false;
        objectListDirty = true;
        const o = objects3D[rid];
        if (o && o.alive) {
          // Use interpolated position at removal time for explosion
          const tl = objectTimelines[rid];
          if (tl && tl.length) {
            const s = sampleTimeline(tl, frame.time, objectTlIdx[rid] || 0);
            objectTlIdx[rid] = s.idx;
            geoToWorld(_pos, s.lon, s.lat, s.alt, acmiData.refLon, acmiData.refLat);
          }
          const exp = createExplosion(_pos.x, _pos.y, _pos.z);
          scene.add(exp);
          explosions.push(exp);
        }
      }
    }

    // Events — only show once per frame, and only if near playhead (avoid replaying on seek)
    if (fi > lastEventFrameIdx && frame.time > targetTime - 0.5) {
      for (let ei = 0; ei < frame.events.length; ei++) showEvent(frame.events[ei]);
      lastEventFrameIdx = fi;
    }

    // Labels
    const lblKeys = Object.keys(frame.labels);
    for (let li = 0; li < lblKeys.length; li++) {
      const lid = lblKeys[li];
      let st = objectStates[lid];
      if (!st) { st = { alive:true, label:'' }; objectStates[lid] = st; }
      st.label = frame.labels[lid];
    }
  }

  currentTime = targetTime;
}

// ═══════════════════════════════════════════
// Update visuals (called once per render frame)
// ═══════════════════════════════════════════
const _halfW = () => innerWidth * 0.5;
const _halfH = () => innerHeight * 0.5;

function updateVisuals() {
  let aliveCount = 0;
  const hw = _halfW(), hh = _halfH();

  for (const id in objectStates) {
    const st = objectStates[id];
    const obj = getOrCreate(id);

    // Sample interpolated position from pre-built timeline
    const tl = objectTimelines[id];
    let iLon, iLat, iAlt, iYaw, iPitch, iRoll;
    if (tl && tl.length) {
      const s = sampleTimeline(tl, currentTime, objectTlIdx[id] || 0);
      objectTlIdx[id] = s.idx;
      iLon = s.lon; iLat = s.lat; iAlt = s.alt;
      iYaw = s.yaw; iPitch = s.pitch; iRoll = s.roll;
    } else {
      iLon = 0; iLat = 0; iAlt = 0; iYaw = 0; iPitch = 0; iRoll = 0;
    }

    geoToWorld(_pos, iLon, iLat, iAlt, acmiData.refLon, acmiData.refLat);

    if (st.alive) {
      obj.mesh.visible = true;
      obj.mesh.position.copy(_pos);
      obj.alive = true;

      if (obj.isCircle) {
        // Cone envelope: orient with parent aircraft heading, scale by Radius
        if (!(obj.coneType === 'nez' ? vizEnabled.nez : vizEnabled.lar)) { obj.mesh.visible = false; }
        else {
          const r = (objectProps[id] || {}).Radius || 0;
          const parentId = circleParents[id];
          if (parentId && r > 0) {
            const ptl = objectTimelines[parentId];
            if (ptl && ptl.length) {
              const ps = sampleTimeline(ptl, currentTime, objectTlIdx[parentId] || 0);
              _vizEuler.set(ps.pitch * DEG2RAD, Math.PI - ps.yaw * DEG2RAD, ps.roll * DEG2RAD, 'YXZ');
              obj.mesh.quaternion.setFromEuler(_vizEuler);
            }
            const baseR = r * Math.tan(obj.coneHalfAngle || 45 * DEG2RAD);
            obj.mesh.scale.set(baseR, baseR, r);
          } else {
            obj.mesh.visible = false;
          }
        }
      } else {
        aliveCount++;
        const yawRad = Math.PI - iYaw * (Math.PI / 180);
        const pitchRad = iPitch * (Math.PI / 180);
        const rollRad = iRoll * (Math.PI / 180);
        obj.mesh.rotation.set(pitchRad, yawRad, rollRad, 'YXZ');

        // Trail
        const tc = obj.trailCount;
        if (tc < TRAIL_MAX) {
          const idx = tc * 3;
          obj.trailBuf[idx] = _pos.x; obj.trailBuf[idx+1] = _pos.y; obj.trailBuf[idx+2] = _pos.z;
          obj.trailCount = tc + 1;
        } else {
          obj.trailBuf.copyWithin(0, 3);
          const idx = (TRAIL_MAX - 1) * 3;
          obj.trailBuf[idx] = _pos.x; obj.trailBuf[idx+1] = _pos.y; obj.trailBuf[idx+2] = _pos.z;
        }
        obj.trailGeo.attributes.position.needsUpdate = true;
        obj.trailGeo.setDrawRange(0, obj.trailCount);
        obj.trail.visible = true;

        // Label — update position via style transform, text via textContent (no innerHTML)
        const lbl = labelEls[id];
        if (lbl) {
          _screenVec.copy(_pos).project(camera);
          if (_screenVec.z < 1 && _screenVec.z > -1) {
            const sx = (_screenVec.x + 1) * hw;
            const sy = (1 - _screenVec.y) * hh;
            lbl.root.style.display = '';
            lbl.root.style.left = sx + 'px';
            lbl.root.style.top = (sy - 20) + 'px';
            const altFt = (iAlt * 3.281) | 0;
            const dp = objectProps[id] || {};
            const defL = acmiData.objectDefs[id] || {};
            let info = `ALT ${altFt}ft HDG ${(iYaw+0.5)|0}°`;
            if (dp.IAS !== undefined) info += ` IAS ${dp.IAS|0}kts`;
            else if (dp.TAS !== undefined) info += ` TAS ${dp.TAS|0}kts`;
            else if (dp.Mach !== undefined) info += ` M${dp.Mach.toFixed(2)}`;
            lbl.infoSpan.textContent = info;
            lbl.nameSpan.textContent = defL.CallSign || defL.Name || id;
            lbl.tacSpan.textContent = st.label || '';
          } else {
            lbl.root.style.display = 'none';
          }
        }

        // ── Radar / WEZ / Lock overlays ──
        {
          const dp = objectProps[id] || {};
          let viz = vizObjects[id];

          // Radar Cone
          if (vizEnabled.radar && dp.RadarRange) {
            if (!viz) viz = vizObjects[id] = {};
            if (!viz.radarCone) { viz.radarCone = new THREE.Mesh(coneGeo, radarMat); viz.radarCone.renderOrder = 1; scene.add(viz.radarCone); }
            const range = dp.RadarRange;
            const hBW = (dp.RadarHorizontalBeamwidth || 10) * DEG2RAD;
            const vBW = (dp.RadarVerticalBeamwidth || 10) * DEG2RAD;
            const rAz = (dp.RadarAzimuth || 0) * DEG2RAD;
            const rEl = (dp.RadarElevation || 0) * DEG2RAD;
            viz.radarCone.position.copy(_pos);
            _vizEuler.set(pitchRad, yawRad, rollRad, 'YXZ');
            _vizQ1.setFromEuler(_vizEuler);
            _vizEuler.set(-rEl, -rAz, 0, 'YXZ');
            _vizQ2.setFromEuler(_vizEuler);
            _vizQ1.multiply(_vizQ2);
            viz.radarCone.quaternion.copy(_vizQ1);
            viz.radarCone.scale.set(range * Math.tan(hBW / 2), range * Math.tan(vBW / 2), range);
            viz.radarCone.visible = true;
          } else if (viz && viz.radarCone) {
            viz.radarCone.visible = false;
          }

          // WEZ Sphere
          if (vizEnabled.wez && dp.EngagementRange) {
            if (!viz) viz = vizObjects[id] = {};
            if (!viz.wezSphere) { viz.wezSphere = new THREE.Mesh(sphereGeo, wezMat); viz.wezSphere.renderOrder = 1; scene.add(viz.wezSphere); }
            const er = dp.EngagementRange;
            const ver = dp.VerticalEngagementRange || er;
            viz.wezSphere.position.copy(_pos);
            viz.wezSphere.scale.set(er, ver, er);
            viz.wezSphere.visible = true;
          } else if (viz && viz.wezSphere) {
            viz.wezSphere.visible = false;
          }

          // Lock Line
          if (vizEnabled.lock && dp.LockedTargetRange) {
            if (!viz) viz = vizObjects[id] = {};
            if (!viz.lockLine) {
              const lg = new THREE.BufferGeometry();
              lg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
              viz.lockLine = new THREE.Line(lg, lockMat);
              scene.add(viz.lockLine);
            }
            const lr = dp.LockedTargetRange;
            const lAz = (dp.LockedTargetAzimuth || 0) * DEG2RAD;
            const lEl = (dp.LockedTargetElevation || 0) * DEG2RAD;
            _vizDir.set(Math.sin(lAz) * Math.cos(lEl) * lr, Math.sin(lEl) * lr, Math.cos(lAz) * Math.cos(lEl) * lr);
            _vizEuler.set(pitchRad, yawRad, rollRad, 'YXZ');
            _vizQ1.setFromEuler(_vizEuler);
            _vizDir.applyQuaternion(_vizQ1);
            const lp = viz.lockLine.geometry.attributes.position;
            lp.array[0] = _pos.x; lp.array[1] = _pos.y; lp.array[2] = _pos.z;
            lp.array[3] = _pos.x + _vizDir.x; lp.array[4] = _pos.y + _vizDir.y; lp.array[5] = _pos.z + _vizDir.z;
            lp.needsUpdate = true;
            viz.lockLine.visible = true;
          } else if (viz && viz.lockLine) {
            viz.lockLine.visible = false;
          }
        }
      }
    } else {
      if (obj.alive) { obj.alive = false; objectListDirty = true; }
      obj.mesh.visible = false;
      if (labelEls[id]) labelEls[id].root.style.display = 'none';
      // Hide viz overlays for dead objects
      const vizD = vizObjects[id];
      if (vizD) {
        if (vizD.radarCone) vizD.radarCone.visible = false;
        if (vizD.wezSphere) vizD.wezSphere.visible = false;
        if (vizD.lockLine) vizD.lockLine.visible = false;
      }
    }
  }

  document.getElementById('info-objects').textContent = aliveCount;

  // Update detail panel for tracked object
  updateDetailPanel();
}

// ═══════════════════════════════════════════
// Detail Panel
// ═══════════════════════════════════════════
let _lastDetailUpdate = 0;

function updateDetailPanel() {
  const panel = document.getElementById('detail-panel');
  if (!trackingId || !acmiData) { panel.style.display = 'none'; return; }
  panel.style.display = '';

  const now = performance.now();
  if (now - _lastDetailUpdate < 250) return;
  _lastDetailUpdate = now;

  const def = acmiData.objectDefs[trackingId] || {};
  const dp = objectProps[trackingId] || {};

  document.getElementById('detail-name').textContent = def.CallSign || def.Name || trackingId;

  const tl = objectTimelines[trackingId];
  let altM, hdgDeg;
  if (tl && tl.length) {
    const s = sampleTimeline(tl, currentTime, objectTlIdx[trackingId] || 0);
    altM = s.alt; hdgDeg = s.yaw;
  }

  const content = document.getElementById('detail-content');
  content.textContent = '';

  // Position section (from interpolation)
  addDetailSection(content, 'Position', [
    ['ALT', altM !== undefined ? `${(altM*3.281)|0}ft / ${Math.round(altM)}m` : '--'],
    ['HDG', hdgDeg !== undefined ? `${(hdgDeg+0.5)|0}\u00B0` : '--'],
  ]);

  for (const cat of DETAIL_CATEGORIES) {
    const rows = [];
    for (const key of cat.keys) {
      const val = def[key] ?? dp[key];
      if (val === undefined || val === null) continue;
      let display;
      if (typeof val === 'number') {
        display = Number.isInteger(val) ? String(val) : val.toFixed(2);
      } else {
        display = String(val);
      }
      rows.push([key, display]);
    }
    if (rows.length > 0) addDetailSection(content, cat.name, rows);
  }
}

function addDetailSection(parent, title, rows) {
  const hdr = document.createElement('div');
  hdr.className = 'detail-section-header';
  hdr.textContent = title;
  parent.appendChild(hdr);
  for (const [key, val] of rows) {
    const row = document.createElement('div');
    row.className = 'detail-row';
    const kSpan = document.createElement('span');
    kSpan.className = 'detail-key';
    kSpan.textContent = key;
    const vSpan = document.createElement('span');
    vSpan.className = 'detail-val';
    vSpan.textContent = val;
    row.append(kSpan, vSpan);
    parent.appendChild(row);
  }
}

// ═══════════════════════════════════════════
// Event display
// ═══════════════════════════════════════════
const MAX_EVENT_MSGS = 6;

function showEvent(evtStr) {
  const p1 = evtStr.indexOf('|');
  if (p1 === -1) return;
  const evtType = evtStr.substring(0, p1);
  const p2 = evtStr.indexOf('|', p1 + 1);

  let objId = '', msg = '', def = {};
  if (p2 !== -1) {
    objId = evtStr.substring(p1 + 1, p2);
    msg = evtStr.substring(p2 + 1);
    def = acmiData?.objectDefs[objId] || {};
  } else {
    msg = evtStr.substring(p1 + 1);
  }

  const container = document.getElementById('event-log');
  while (container.childElementCount >= MAX_EVENT_MSGS) {
    container.removeChild(container.firstElementChild);
  }

  const el = document.createElement('div');
  let cls = 'event-msg';
  let icon = '';

  if (evtType === 'Destroyed') { cls += ' destroyed-event'; icon = '\u2716 '; }
  else if (evtType === 'TakenOff') { cls += ' takeoff-event'; icon = '\u2191 '; }
  else if (evtType === 'Landed') { cls += ' landed-event'; icon = '\u2193 '; }
  else if (evtType === 'Bookmark') { cls += ' bookmark-event'; icon = '\u2605 '; }
  else if (evtType === 'Timeout') { cls += ' timeout-event'; icon = '\u231B '; }
  else if (evtType === 'Message' && (msg.includes('FOX') || msg.includes('LAUNCH'))) { cls += ' hit-event'; icon = '\uD83D\uDE80 '; }
  else if (evtType === 'Message' && (msg.includes('DODGE') || msg.includes('EVADE'))) { cls += ' takeoff-event'; icon = '\u21BA '; }
  else if (evtType === 'Message' && msg.includes('NEZ')) { cls += ' bookmark-event'; icon = '\u26A0 '; }
  else if (msg.includes('SPLASH') || msg.includes('HIT')) cls += ' hit-event';
  else if (def.Color === 'Blue') cls += ' blue-event';
  else if (def.Color === 'Red') cls += ' red-event';

  el.className = cls;
  const name = def.Name || objId;
  el.textContent = name ? `${icon}[${name}] ${msg}` : `${icon}${msg}`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ═══════════════════════════════════════════
// Object list (only rebuild when dirty)
// ═══════════════════════════════════════════
function getTypeCategory(type) {
  if (!type) return 'Other';
  if (type.includes('Circle') || type.includes('Misc')) return 'Circle';
  if (type.includes('Missile')) return 'Missile';
  if (type.includes('FixedWing')) return 'Fixed Wing';
  if (type.includes('Rotorcraft')) return 'Rotorcraft';
  if (type.includes('Ground')) return 'Ground';
  if (type.includes('Sea')) return 'Sea';
  if (type.includes('Air')) return 'Air';
  if (type.includes('Weapon')) return 'Weapon';
  if (type.includes('Navaid') || type.includes('Bullseye')) return 'Navaid';
  return 'Other';
}

function rebuildObjectList() {
  if (!objectListDirty || !acmiData) return;
  objectListDirty = false;

  const list = document.getElementById('object-list');
  list.textContent = '';

  // Group objects by type category (skip circles — they're visual aids)
  const groups = {};
  for (const [id, def] of Object.entries(acmiData.objectDefs)) {
    const cat = getTypeCategory(def.Type || '');
    if (cat === 'Circle') continue;
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push([id, def]);
  }

  // Display order
  const order = ['Fixed Wing', 'Rotorcraft', 'Air', 'Ground', 'Sea', 'Navaid', 'Other', 'Weapon', 'Missile'];

  for (const cat of order) {
    const items = groups[cat];
    if (!items || items.length === 0) continue;

    const hdr = document.createElement('div');
    hdr.className = 'obj-type-header';
    hdr.textContent = `${cat} (${items.length})`;
    list.appendChild(hdr);

    for (const [id, def] of items) {
      const alive = objectStates[id]?.alive !== false;
      const el = document.createElement('div');
      el.className = 'obj-entry' + (alive ? '' : ' destroyed') + (trackingId === id ? ' tracking' : '');
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = getCSSColor(def.Color);
      el.appendChild(dot);

      // Name with CallSign
      const nameText = document.createElement('span');
      if (def.CallSign) {
        const cs = document.createElement('span');
        cs.className = 'obj-callsign';
        cs.textContent = def.CallSign + ' ';
        nameText.appendChild(cs);
      }
      nameText.appendChild(document.createTextNode(def.Name || id));
      el.appendChild(nameText);

      // Country code
      if (def.Country) {
        const extra = document.createElement('span');
        extra.className = 'obj-extra';
        extra.textContent = def.Country;
        el.appendChild(extra);
      }

      // Click to track (skip missiles)
      if (cat !== 'Missile') {
        el.addEventListener('click', () => {
          trackingId = trackingId === id ? null : id;
          document.getElementById('camera-mode-text').textContent = trackingId ? `Tracking ${def.CallSign || def.Name}` : 'Free';
          objectListDirty = true;
        });
        el.style.cursor = 'pointer';
      }
      list.appendChild(el);
    }
  }
}

// ═══════════════════════════════════════════
// Camera tracking
// ═══════════════════════════════════════════
function updateCamera() {
  if (!trackingId) return;
  const st = objectStates[trackingId];
  if (!st || !st.alive) return;

  // Sample interpolated position from timeline
  const tl = objectTimelines[trackingId];
  if (!tl || !tl.length) return;
  const s = sampleTimeline(tl, currentTime, objectTlIdx[trackingId] || 0);
  objectTlIdx[trackingId] = s.idx;

  geoToWorld(_camTarget, s.lon, s.lat, s.alt, acmiData.refLon, acmiData.refLat);
  const yawRad = Math.PI - s.yaw * (Math.PI / 180);
  _camOff.set(0, 1500, -3000).applyAxisAngle(_yAxis, yawRad);
  _camOff.add(_camTarget);

  camera.position.lerp(_camOff, 0.06);
  controls.target.lerp(_camTarget, 0.12);
}

// ═══════════════════════════════════════════
// Load ACMI
// ═══════════════════════════════════════════
function loadACMIIntoScene(data) {
  acmiData = data;
  currentTime = 0; playing = false; lastFrameIdx = 0; lastEventFrameIdx = -1; trackingId = null;

  // Clear previous
  for (const id in objects3D) {
    scene.remove(objects3D[id].mesh);
    if (objects3D[id].trail) scene.remove(objects3D[id].trail);
    delete objects3D[id];
  }
  for (const id in labelEls) { labelEls[id].root.remove(); delete labelEls[id]; }
  for (const id in objectStates) delete objectStates[id];
  for (const id in objectProps) delete objectProps[id];
  for (const e of explosions) scene.remove(e);
  explosions.length = 0;
  // Clear viz overlays
  for (const id in vizObjects) {
    const viz = vizObjects[id];
    if (viz.radarCone) scene.remove(viz.radarCone);
    if (viz.wezSphere) scene.remove(viz.wezSphere);
    if (viz.lockLine) { scene.remove(viz.lockLine); viz.lockLine.geometry.dispose(); }
    delete vizObjects[id];
  }

  document.getElementById('scenario-title').textContent = data.title || 'ACMI Replay';
  document.getElementById('info-duration').textContent = data.maxTime.toFixed(1) + 's';
  document.getElementById('timeline-slider').max = Math.floor(data.maxTime * 10);
  document.querySelectorAll('.hud').forEach(el => el.style.display = '');
  document.getElementById('detail-panel').style.display = 'none';

  // Populate extra global info
  const extraEl = document.getElementById('info-extra');
  extraEl.textContent = '';
  const extras = [
    ['Author', data.author], ['Source', data.dataSource],
    ['Recorder', data.dataRecorder], ['Category', data.category],
    ['Map', data.mapId],
  ];
  for (const [label, val] of extras) {
    if (!val) continue;
    const row = document.createElement('div');
    row.className = 'info-row';
    row.appendChild(document.createTextNode(label + ': '));
    const span = document.createElement('span');
    span.textContent = val;
    row.appendChild(span);
    extraEl.appendChild(row);
  }

  // Center camera on action
  const f0 = data.frames[0];
  if (f0 && f0.updates.length) {
    let cx=0,cy=0,cz=0,n=0;
    for (const u of f0.updates) {
      if (u.lon !== undefined) {
        geoToWorld(_pos, u.lon, u.lat, u.alt, data.refLon, data.refLat);
        cx += _pos.x; cy += _pos.y; cz += _pos.z; n++;
      }
    }
    if (n) { cx/=n; cy/=n; cz/=n; controls.target.set(cx,cy,cz); camera.position.set(cx+5000,cy+8000,cz+15000); }
  }

  buildTimelines(data);

  // Build circle → parent aircraft mapping by matching positions at t=0
  for (const id in circleParents) delete circleParents[id];
  for (const cid in data.objectDefs) {
    const cdef = data.objectDefs[cid];
    if (!(cdef.Type || '').includes('Circle')) continue;
    const ctl = objectTimelines[cid];
    if (!ctl || !ctl.length) continue;
    const cp = ctl[0];
    let bestId = null, bestDist = Infinity;
    for (const pid in objectTimelines) {
      if (pid === cid) continue;
      const pdef = data.objectDefs[pid] || {};
      if ((pdef.Type || '').includes('Circle') || (pdef.Type || '').includes('Misc')) continue;
      const ptl = objectTimelines[pid];
      if (!ptl || !ptl.length) continue;
      const pp = ptl[0];
      const d = Math.abs(cp.lon - pp.lon) + Math.abs(cp.lat - pp.lat) + Math.abs(cp.alt - pp.alt);
      if (d < bestDist) { bestDist = d; bestId = pid; }
    }
    if (bestId && bestDist < 0.01) circleParents[cid] = bestId;
  }

  objectListDirty = true;
  applyFramesUpTo(0);
  updateVisuals();
  rebuildObjectList();
}

// ═══════════════════════════════════════════
// Animation loop
// ═══════════════════════════════════════════
let prevT = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = prevT ? (ts - prevT) * 0.001 : 0;
  prevT = ts;

  if (playing && acmiData) {
    currentTime += dt * playSpeed;
    if (currentTime >= acmiData.maxTime) {
      currentTime = acmiData.maxTime;
      playing = false;
      document.getElementById('btn-play').innerHTML = '&#9654; Play';
    }
    applyFramesUpTo(currentTime);
    document.getElementById('timeline-slider').value = (currentTime * 10) | 0;
  }

  // Update 3D positions/labels
  if (acmiData) updateVisuals();

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.userData.life -= dt * 0.5;
    if (e.userData.life <= 0) { scene.remove(e); e.geometry.dispose(); e.material.dispose(); explosions.splice(i,1); continue; }
    e.material.opacity = e.userData.life;
    const p = e.geometry.attributes.position;
    const v = e.userData.vel;
    for (let j = 0; j < p.count; j++) {
      p.array[j*3]   += v[j*3]   * dt;
      p.array[j*3+1] += v[j*3+1] * dt;
      p.array[j*3+2] += v[j*3+2] * dt;
    }
    p.needsUpdate = true;
  }

  // Object list rebuild (throttled to dirty flag)
  rebuildObjectList();

  updateCamera();
  controls.update();

  // Time display
  const m = (currentTime / 60) | 0;
  const s = (currentTime % 60).toFixed(1);
  document.getElementById('time-display').textContent = `${String(m).padStart(2,'0')}:${s.padStart(4,'0')}`;
  document.getElementById('info-time').textContent = currentTime.toFixed(1) + 's';

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════
// UI Controls
// ═══════════════════════════════════════════
function setupUI() {
  const playBtn = document.getElementById('btn-play');
  const slider = document.getElementById('timeline-slider');

  playBtn.addEventListener('click', () => {
    if (!acmiData) return;
    playing = !playing;
    playBtn.innerHTML = playing ? '&#9646;&#9646; Pause' : '&#9654; Play';
    if (playing && currentTime >= acmiData.maxTime) { currentTime = 0; lastFrameIdx = 0; }
  });

  const speeds = [0.25, 0.5, 1, 2, 4, 8, 16];
  document.getElementById('btn-faster').addEventListener('click', () => {
    const i = speeds.indexOf(playSpeed);
    if (i < speeds.length - 1) playSpeed = speeds[i+1];
    document.getElementById('speed-display').textContent = playSpeed + 'x';
  });
  document.getElementById('btn-slower').addEventListener('click', () => {
    const i = speeds.indexOf(playSpeed);
    if (i > 0) playSpeed = speeds[i-1];
    document.getElementById('speed-display').textContent = playSpeed + 'x';
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!acmiData) return;
    currentTime = 0; lastFrameIdx = 0; lastEventFrameIdx = -1; playing = false;
    playBtn.innerHTML = '&#9654; Play';
    for (const id in objects3D) {
      const o = objects3D[id];
      if (o.trail) { o.trailCount = 0; o.trailGeo.setDrawRange(0,0); o.trail.visible = false; }
      o.mesh.visible = false;
    }
    for (const id in objectStates) delete objectStates[id];
    for (const id in objectProps) delete objectProps[id];
    for (const e of explosions) { scene.remove(e); e.geometry.dispose(); e.material.dispose(); }
    explosions.length = 0;
    for (const id in vizObjects) {
      const viz = vizObjects[id];
      if (viz.radarCone) viz.radarCone.visible = false;
      if (viz.wezSphere) viz.wezSphere.visible = false;
      if (viz.lockLine) viz.lockLine.visible = false;
    }
    objectListDirty = true;
    applyFramesUpTo(0);
    slider.value = 0;
  });

  slider.addEventListener('input', () => {
    if (!acmiData) return;
    const t = slider.value * 0.1;
    applyFramesUpTo(t);
    currentTime = t;
  });

  document.addEventListener('keydown', (e) => {
    if (!acmiData) return;
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    else if (e.code === 'Escape') { trackingId = null; document.getElementById('camera-mode-text').textContent = 'Free'; objectListDirty = true; }
    else if (e.key === '+' || e.key === '=') document.getElementById('btn-faster').click();
    else if (e.key === '-' || e.key === '_') document.getElementById('btn-slower').click();
    else if (e.key === 'r' || e.key === 'R') document.getElementById('btn-reset').click();
  });

  // Viz overlay checkboxes
  document.getElementById('viz-lar').addEventListener('change', e => { vizEnabled.lar = e.target.checked; });
  document.getElementById('viz-nez').addEventListener('change', e => { vizEnabled.nez = e.target.checked; });
  document.getElementById('viz-radar').addEventListener('change', e => { vizEnabled.radar = e.target.checked; });
  document.getElementById('viz-wez').addEventListener('change', e => { vizEnabled.wez = e.target.checked; });
  document.getElementById('viz-lock').addEventListener('change', e => { vizEnabled.lock = e.target.checked; });

  // Double-click to track
  renderer.domElement.addEventListener('dblclick', (e) => {
    if (!acmiData) return;
    const rc = new THREE.Raycaster();
    const mouse = new THREE.Vector2(
      (e.clientX / innerWidth) * 2 - 1,
      -(e.clientY / innerHeight) * 2 + 1
    );
    rc.setFromCamera(mouse, camera);

    let closest = null, bestD = Infinity;
    for (const id in objects3D) {
      const o = objects3D[id];
      if (!o.alive || !o.mesh.visible || o.isMissile) continue;
      const hits = rc.intersectObject(o.mesh);
      if (hits.length && hits[0].distance < bestD) { closest = id; bestD = hits[0].distance; }
    }
    if (closest) {
      trackingId = trackingId === closest ? null : closest;
      const def = acmiData.objectDefs[closest] || {};
      document.getElementById('camera-mode-text').textContent = trackingId ? `Tracking ${def.Name}` : 'Free';
      objectListDirty = true;
    }
  });
}

// ═══════════════════════════════════════════
// Drag & Drop
// ═══════════════════════════════════════════
function setupDragDrop() {
  document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); });
  document.addEventListener('dragleave', e => { if (!e.relatedTarget) document.getElementById('drop-zone').classList.remove('drag-over'); });
  document.addEventListener('drop', e => { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('drop-zone').classList.add('hidden');
    loadACMIIntoScene(parseACMI(e.target.result));
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════
initScene();
setupUI();
setupDragDrop();
animate(0);
</script>
</body>
</html>
